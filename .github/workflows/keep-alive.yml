name: Keep Render App Active

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ping Render App
      run: |
        curl -f -s -o /dev/null -w "%{http_code}" https://saasifyapi.rajeesh.online/api/health || exit 1
        echo "App pinged successfully at $(date)"
